[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = --strict-markers -v --cov=app --cov-report=term-missing
testpaths = tests
env =
    ENVIRONMENT=testing
    DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/api_gestion_interna_test
