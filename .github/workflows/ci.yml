name: CI Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
          POSTGRES_DB: api_gestion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. 
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        
    - name: Set Environment Variables for Tests
      run: |
        echo "ENVIRONMENT=testing" >> $GITHUB_ENV
        echo "SECRET_KEY=test_super_secret_key_that_is_at_least_32_characters_long" >> $GITHUB_ENV
        echo "DATABASE_URL=postgresql+asyncpg://dev_user:dev_password@localhost:5432/api_gestion_test" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
        echo "CORS_ORIGINS=http://localhost:3000,http://localhost:8080" >> $GITHUB_ENV
        
    - name: Run Migrations (Alembic)
      run: |
        alembic upgrade head
        
    - name: Test with pytest
      run: |
        pytest
